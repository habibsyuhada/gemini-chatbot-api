<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Motivator Realis</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div class="app-container">
    <header class="chat-header">
      <div class="header-content">
        <div class="avatar">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <path d="M8 14s1.5 2 4 2 4-2 4-2"/>
            <line x1="9" y1="9" x2="9.01" y2="9"/>
            <line x1="15" y1="9" x2="15.01" y2="9"/>
          </svg>
        </div>
        <div class="header-text">
          <h1>Motivator Realis</h1>
          <span class="status">Nyeselin, tapi jujur</span>
        </div>
        <button id="settings-btn" class="settings-btn" aria-label="Settings" title="Settings">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1Z"/>
          </svg>
        </button>
      </div>
    </header>

    <main class="chat-main">
      <div id="chat-box" class="chat-box">
        <div class="welcome-message">
          <div class="welcome-icon">💀</div>
          <h2>Selamat Datang, Manusia</h2>
          <p>Curhat apa aja. Aku jawab jujur, pedes, dan tanpa basa-basi.</p>
          <div class="example-prompts">
            <button class="prompt-btn" data-prompt="Gimana cara jadi kaya tanpa kerja?">💰 Cara jadi kaya?</button>
            <button class="prompt-btn" data-prompt="Aku capek kerja, pengen resign.">😮‍💨 Aku capek kerja, pengen resign.</button>
            <button class="prompt-btn" data-prompt="Masa depanku suram banget.">🌑 Masa depanku suram banget.</button>
            <button class="prompt-btn" data-prompt="Cara move on dari mantan?">💔 Cara move on dari mantan?</button>
            <button class="prompt-btn" data-prompt="Bikinin kata-kata mutiara dong.">✨ Bikinin kata-kata mutiara dong.</button>
            <button class="prompt-btn" data-prompt="Aku pengen sukses tapi males.">🛋️ Aku pengen sukses tapi males.</button>
          </div>
        </div>
      </div>
    </main>

    <footer class="chat-footer">
      <form id="chat-form" class="chat-form">
        <div class="input-wrapper">
          <input
            type="text"
            id="user-input"
            placeholder="Curhat kerja, cinta, atau hidup..."
            autocomplete="off"
          />
          <button type="submit" class="send-button" aria-label="Send message">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M22 2L11 13"/>
              <path d="M22 2L15 22L11 13L2 9L22 2"/>
            </svg>
          </button>
        </div>
      </form>
      <p class="footer-text">Powered by Google Gemini + Pahitnya Realita</p>
    </footer>
  </div>

  <!-- Settings Modal -->
  <div id="settings-modal" class="modal">
    <div class="modal-overlay"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h2>⚙️ Settings</h2>
        <button id="close-settings" class="close-btn" aria-label="Close settings">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label for="model-select">AI Model</label>
          <select id="model-select">
            <option value="gemini-2.5-flash">gemini-2.5-flash (Default - Balanced)</option>
            <option value="gemini-2.5-flash-lite">gemini-2.5-flash-lite (Lighter, Fast)</option>
            <option value="gemini-3-flash">gemini-3-flash (Newer, Smarter)</option>
            <option value="gemini-3.1-flash-lite">gemini-3.1-flash-lite (Highest RPM!)</option>
          </select>
          <small>Flash = Fast responses, Lite = Lighter, 3.1 = Newest</small>
        </div>
        <div class="form-group">
          <label for="api-key-input">API Key (Opsional)</label>
          <div class="api-key-wrapper">
            <input
              type="password"
              id="api-key-input"
              placeholder="Kosongkan = pakai server default"
            />
            <button id="toggle-api-visibility" class="toggle-btn" type="button" aria-label="Toggle visibility">
              <svg class="eye-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <small>API key disimpan di browser saja (aman)</small>
        </div>
      </div>
      <div class="modal-footer">
        <button id="cancel-settings" class="btn-secondary">Batal</button>
        <button id="save-settings" class="btn-primary">Simpan</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
